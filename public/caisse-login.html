<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA'BIA - Accès Caisse</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #143621; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #143621; margin-bottom: 5px; font-weight: 800; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; font-family: monospace; letter-spacing: 2px;}
        input:focus { border-color: #db800a; }
        button { width: 100%; padding: 12px; background: #db800a; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s;}
        button:hover { background: #b86a07; }
        #erreur { color: #e74c3c; font-weight: bold; margin-top: 15px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>TA'BIA CAISSE</h1>
        <p>Veuillez entrer le Token d'accès fourni par le développeur.</p>
        <input type="password" id="tokenInput" placeholder="EX: TABIA-XXXX-XXXX">
        <button id="btnConnexion">Déverrouiller la Caisse</button>
        <div id="erreur">Token invalide. Accès refusé.</div>
    </div>

    <script>
        document.getElementById('btnConnexion').addEventListener('click', async () => {
            const token = document.getElementById('tokenInput').value.trim();
            const btn = document.getElementById('btnConnexion');
            const erreurDiv = document.getElementById('erreur');
            
            if (!token) return;
            btn.innerHTML = "Vérification...";
            btn.disabled = true;

            try {
                // On demande au serveur si le token est le bon
                const response = await fetch('/api/caisse/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                const data = await response.json();

                if (data.success) {
                    // C'est le bon ! On le sauvegarde dans la tablette et on ouvre la caisse
                    localStorage.setItem('tabia_caisse_token', token);
                    window.location.href = '/caisse.html';
                } else {
                    erreurDiv.style.display = 'block';
                    btn.innerHTML = "Déverrouiller la Caisse";
                    btn.disabled = false;
                }
            } catch (err) {
                erreurDiv.innerText = "Erreur de connexion au serveur.";
                erreurDiv.style.display = 'block';
                btn.innerHTML = "Déverrouiller la Caisse";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
