<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarbini SaaS - Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0b1120; 
            --card-bg: #111827; 
            --primary: #00F2FE; 
            --secondary: #4FACFE; 
            --danger: #ef4444; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.05), transparent 40%);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 800; font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 5px; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); margin: 0; font-size: 1rem; }

        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }

        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 16px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h2 { margin-top: 0; color: #fff; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        .input-group { margin-top: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: 0.3s; }
        .input-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .input-group input[type="color"] { height: 45px; padding: 2px; cursor: pointer; }

        .btn { width: 100%; padding: 14px; margin-top: 25px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.98); }
        
        .btn-deploy { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: #000; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); }
        .btn-deploy:hover { box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5); }
        
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border); }
        .search-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; color: white; font-family: 'Outfit'; outline: none; width: 200px;}
        
        .cafe-list { display: grid; gap: 15px; max-height: 70vh; overflow-y: auto; padding-right: 5px; }
        .cafe-list::-webkit-scrollbar { width: 6px; }
        .cafe-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .cafe-item { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--primary); transition: 0.2s; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .cafe-item:hover { background: rgba(255,255,255,0.06); transform: translateX(5px); }
        
        .cafe-info { display: flex; align-items: center; gap: 15px; }
        .cafe-logo { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #000; border: 2px solid rgba(255,255,255,0.1); }
        .cafe-details h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .cafe-details .domain { font-size: 0.75rem; color: var(--primary); background: rgba(0, 242, 254, 0.1); padding: 3px 8px; border-radius: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .cafe-details .domain:hover { background: rgba(0, 242, 254, 0.2); }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-icon { background: rgba(255,255,255,0.1); color: white; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { background: rgba(255,255,255,0.2); }
        .btn-edit:hover { background: #f1c40f; color: #000; }
        .btn-delete:hover { background: var(--danger); color: white; }
        .btn-copy:hover { background: var(--primary); color: #000; }

        /* Toast Notifications */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card-bg); border-left: 4px solid var(--primary); color: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 0.9rem; animation: slideIn 0.3s ease-out forwards; display: flex; align-items: center; gap: 10px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>SARBINI SAAS</h1>
    <p>Centre de Déploiement & Cloud Control</p>
</div>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-rocket" style="color: var(--primary);"></i> Instance Client</h2>
        
        <div class="input-group">
            <label>Clé Master d'Authentification</label>
            <input type="password" id="masterKey" value="SARBINI_BOSS_2026">
        </div>
        
        <div class="input-group">
            <label>Sous-domaine (ID Unique)</label>
            <input type="text" id="cafeId" placeholder="ex: tabia">
        </div>
        
        <div class="input-group">
            <label>Nom Public de l'Établissement</label>
            <input type="text" id="nomCafe" placeholder="Ex: TA'BIA Coffee">
        </div>
        
        <div class="input-group">
            <label>Slogan (Ex: Bar, Fast-Food...)</label>
            <input type="text" id="sloganCafe" placeholder="Ex: Coffee Shop">
        </div>

        <div class="input-group">
            <label>Mot de Passe Système Caisse 🔒</label>
            <input type="text" id="caisseToken" placeholder="ex: tabia2026">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Couleur Marque</label>
                <input type="color" id="couleur" value="#143621">
            </div>
            <div class="input-group">
                <label>Nom du fichier Logo</label>
                <input type="text" id="logoUrl" placeholder="logo.jpg" value="logo.jpg">
            </div>
        </div>

        <button class="btn btn-deploy" onclick="creerCafe()" id="deployBtn">
            <i class="fas fa-cloud-upload-alt"></i> INITIALISER LE CAFÉ
        </button>
    </div>

    <div>
        <div class="stats-bar">
            <div>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Clients Actifs :</span>
                <strong style="font-size: 1.2rem; margin-left: 5px; color: var(--primary);" id="totalCafes">0</strong>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="searchCafe" class="search-box" placeholder="Rechercher un café..." onkeyup="filtrerCafes()">
                <button class="btn-icon" onclick="chargerCafes()" title="Rafraîchir"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>

        <div id="liste" class="cafe-list">
            </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
    const MASTER_URL = "sarbini.click";
    let cafesData = []; 

    // --- Système de Notification ---
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : (type === 'warning' ? '#f1c40f' : 'var(--primary)');
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : (type === 'warning' ? 'fa-pen' : 'fa-check-circle')}"></i> ${message}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function copyPassword(pwd) {
        navigator.clipboard.writeText(pwd).then(() => showToast("Mot de passe copié !"));
    }

    // --- Chargement des Cafés ---
    async function chargerCafes() {
        const key = document.getElementById('masterKey').value;
        const container = document.getElementById('liste');
        container.innerHTML = "<div style='text-align:center; padding: 20px;'><i class='fas fa-spinner fa-spin fa-2x' style='color:var(--primary);'></i></div>";

        try {
            const res = await fetch('/api/admin/cafes', { headers: { 'authorization': key } });
            if (!res.ok) {
                showToast(`Erreur d'authentification`, 'error');
                return container.innerHTML = `<span style="color:var(--danger);">Accès refusé. Vérifiez la clé Master.</span>`;
            }
            
            cafesData = await res.json();
            document.getElementById('totalCafes').innerText = cafesData.length;
            afficherListe(cafesData);

        } catch(e) { 
            showToast('Serveur injoignable', 'error');
            container.innerHTML = "<span style='color:var(--danger);'>Erreur de connexion.</span>"; 
        }
    }

    // --- Affichage ---
    function afficherListe(liste) {
        const container = document.getElementById('liste');
        if (liste.length === 0) return container.innerHTML = "<div style='color:var(--text-muted); text-align:center; padding: 30px;'><i class='fas fa-box-open fa-2x'></i><br>Aucun café déployé.</div>";
        
        container.innerHTML = "";
        liste.forEach(c => {
            const siteUrl = `https://${c.cafeId}.${MASTER_URL}`;
            const div = document.createElement('div');
            div.className = "cafe-item";
            div.style.borderLeftColor = c.couleurPrincipale || 'var(--primary)';
            div.innerHTML = `
                <div class="cafe-info">
                    <img src="${c.logoUrl || 'https://via.placeholder.com/50'}" class="cafe-logo" onerror="this.src='https://via.placeholder.com/50/000/FFF?text=IMG'">
                    <div class="cafe-details">
                        <h3>${c.nomCafe || 'Sans Nom'} <span style="font-size:0.7rem; color:#94a3b8; font-weight:normal;">- ${c.sloganCafe || 'Coffee Shop'}</span></h3>
                        <a href="${siteUrl}" target="_blank" class="domain"><i class="fas fa-external-link-alt"></i> ${c.cafeId}.${MASTER_URL}</a>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn-icon btn-edit" onclick="editerCafe('${c.cafeId}')" title="Modifier le Design"><i class="fas fa-paint-brush"></i></button>
                    <button class="btn-icon btn-copy" onclick="copyPassword('${c.caisseToken || '12345678'}')" title="Copier le MDP"><i class="fas fa-key"></i></button>
                    <button class="btn-icon btn-delete" onclick="supprimerCafe('${c.cafeId}')" title="Détruire"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function filtrerCafes() {
        const text = document.getElementById('searchCafe').value.toLowerCase();
        const filtres = cafesData.filter(c => c.nomCafe.toLowerCase().includes(text) || c.cafeId.toLowerCase().includes(text));
        afficherListe(filtres);
    }

    // --- LA FONCTION ÉDITER ---
    function editerCafe(id) {
        const cafe = cafesData.find(c => c.cafeId === id);
        if (!cafe) return;

        // On remplit le formulaire
        document.getElementById('cafeId').value = cafe.cafeId;
        document.getElementById('cafeId').readOnly = true; // On empêche de changer l'URL
        document.getElementById('cafeId').style.opacity = "0.5";
        
        document.getElementById('nomCafe').value = cafe.nomCafe || '';
        document.getElementById('sloganCafe').value = cafe.sloganCafe || 'Coffee Shop';
        document.getElementById('caisseToken').value = cafe.caisseToken || '';
        document.getElementById('couleur').value = cafe.couleurPrincipale || '#143621';
        document.getElementById('logoUrl').value = cafe.logoUrl || 'logo.jpg';

        // On change le bouton pour le mode "Mise à jour"
        const btn = document.getElementById('deployBtn');
        btn.innerHTML = "<i class='fas fa-sync'></i> METTRE À JOUR LE DESIGN";
        btn.style.background = "linear-gradient(45deg, #f39c12, #e67e22)";
        btn.style.color = "#000";

        window.scrollTo({ top: 0, behavior: 'smooth' });
        showToast(`Mode édition pour le café : ${id}`, 'warning');
    }

    // --- Créer ou Mettre à jour ---
    async function creerCafe() {
        const key = document.getElementById('masterKey').value;
        const cafeId = document.getElementById('cafeId').value.toLowerCase().trim().replace(/[^a-z0-9]/g, ''); 
        if(!cafeId) return showToast("Le sous-domaine est obligatoire !", "error");
        
        const btn = document.getElementById('deployBtn');
        const isUpdate = btn.innerText.includes("METTRE À JOUR");
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> TRAITEMENT..."; btn.disabled = true;

        const data = {
            targetCafeId: cafeId,
            nomCafe: document.getElementById('nomCafe').value || cafeId.toUpperCase(),
            sloganCafe: document.getElementById('sloganCafe').value || "Coffee Shop",
            caisseToken: document.getElementById('caisseToken').value || '12345678',
            couleurPrincipale: document.getElementById('couleur').value,
            logoUrl: document.getElementById('logoUrl').value
        };

        try {
            const res = await fetch('/api/branding', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'authorization': key },
                body: JSON.stringify(data)
            });

            if(res.ok) { 
                showToast(isUpdate ? `Design mis à jour avec succès !` : `Instance déployée avec succès !`);
                
                // Réinitialiser le formulaire
                document.getElementById('cafeId').value = ""; 
                document.getElementById('cafeId').readOnly = false;
                document.getElementById('cafeId').style.opacity = "1";
                document.getElementById('nomCafe').value = "";
                document.getElementById('sloganCafe').value = "";
                document.getElementById('caisseToken').value = "";
                
                // Remettre le bouton normal
                btn.innerHTML = "<i class='fas fa-cloud-upload-alt'></i> INITIALISER LE CAFÉ";
                btn.style.background = ""; // Remet le CSS par défaut
                
                chargerCafes(); 
            } else { showToast("Erreur lors de l'opération.", "error"); }
        } catch(e) { showToast("Erreur réseau.", "error"); }
        
        btn.disabled = false;
    }

    async function supprimerCafe(id) {
        if(!confirm(`ATTENTION : Voulez-vous détruire l'instance "${id}" et TOUTES ses données ?`)) return;
        
        const key = document.getElementById('masterKey').value;
        try {
            const res = await fetch(`/api/admin/cafes/${id}`, { method: 'DELETE', headers: { 'authorization': key } });
            if(res.ok) {
                showToast(`Instance ${id} détruite.`);
                chargerCafes();
            } else {
                showToast("Échec de la suppression.", "error");
            }
        } catch(e) { showToast("Erreur réseau.", "error"); }
    }

    window.onload = chargerCafes;
</script>
</body>
</html>
