<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarbini SaaS | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'] },
                    colors: {
                        deep: '#030712', surface: '#111827', surface2: '#1f2937', 
                        neon: '#00F2FE', alert: '#f43f5e', warning: '#f59e0b', success: '#10b981'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; color: #f8fafc; overflow-x: hidden; }
        /* Effet Grille "War Room" en fond */
        .bg-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px); }
        
        /* Composants Glassmorphism */
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-tech { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; transition: all 0.3s; }
        .input-tech:focus { border-color: #00F2FE; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); outline: none; }
        
        /* Animations LED */
        .led-green { box-shadow: 0 0 10px #10b981, inset 0 0 5px #10b981; animation: pulse-green 2s infinite; }
        .led-red { box-shadow: 0 0 10px #f43f5e, inset 0 0 5px #f43f5e; animation: pulse-red 1s infinite; }
        @keyframes pulse-green { 0% { opacity: 0.7; } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.7; } }
        @keyframes pulse-red { 0% { opacity: 0.5; } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; } }

        /* Scrollbar tech */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00F2FE; }

        /* Custom Toast */
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-grid min-h-screen pb-10">

    <nav class="glass-panel sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-[1400px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-satellite-dish text-neon text-2xl animate-pulse"></i>
                <div>
                    <h1 class="font-black text-xl tracking-widest leading-none">SARBINI<span class="text-neon">.CLICK</span></h1>
                    <span class="text-[0.65rem] text-slate-400 font-mono tracking-[0.2em] uppercase">Global Control Center</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-black/40 px-3 py-1.5 rounded-lg border border-slate-800">
                    <i class="fas fa-key text-slate-500 text-sm"></i>
                    <input type="password" id="masterKey" class="bg-transparent border-none text-slate-300 text-sm w-40 focus:outline-none font-mono placeholder-slate-600" placeholder="Master Key...">
                </div>
                <div class="flex items-center gap-2 text-xs font-mono bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full border border-emerald-500/20">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 led-green"></div>
                    SYSTEM ONLINE
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-[1400px] mx-auto px-6 mt-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel rounded-2xl p-5 border-l-4 border-l-neon flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Instances Déployées</p>
                    <h3 class="text-3xl font-black text-white" id="kpi-total">0</h3>
                </div>
                <div class="w-12 h-12 rounded-full bg-neon/10 flex items-center justify-center text-neon text-xl"><i class="fas fa-server"></i></div>
            </div>
            <div class="glass-panel rounded-2xl p-5 border-l-4 border-l-success flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Abonnements Actifs</p>
                    <h3 class="text-3xl font-black text-success" id="kpi-actifs">0</h3>
                </div>
                <div class="w-12 h-12 rounded-full bg-success/10 flex items-center justify-center text-success text-xl"><i class="fas fa-check-circle"></i></div>
            </div>
            <div class="glass-panel rounded-2xl p-5 border-l-4 border-l-alert flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Impayés / Suspendus</p>
                    <h3 class="text-3xl font-black text-alert" id="kpi-suspendus">0</h3>
                </div>
                <div class="w-12 h-12 rounded-full bg-alert/10 flex items-center justify-center text-alert text-xl"><i class="fas fa-lock"></i></div>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4">
                <div class="glass-panel rounded-3xl p-6 relative overflow-hidden" id="formContainer">
                    <div class="absolute -top-20 -right-20 w-64 h-64 bg-neon/5 rounded-full blur-[50px] pointer-events-none"></div>
                    
                    <h2 class="text-xl font-black mb-6 flex items-center gap-3">
                        <i class="fas fa-rocket text-neon"></i> Console de Déploiement
                    </h2>

                    <div class="space-y-5 relative z-10">
                        <div class="p-4 bg-black/30 rounded-2xl border border-slate-800/50">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">1. Configuration Réseau</h3>
                            <div>
                                <label class="block text-sm font-semibold text-slate-300 mb-1">Sous-domaine (ID) <span class="text-alert">*</span></label>
                                <div class="flex">
                                    <input type="text" id="cafeId" class="input-tech rounded-l-xl px-4 py-3 w-full text-neon font-mono" placeholder="ex: lorient">
                                    <span class="bg-surface2 border border-l-0 border-white/10 rounded-r-xl px-3 py-3 text-slate-400 text-sm flex items-center font-mono">.sarbini.click</span>
                                </div>
                            </div>
                        </div>

                        <div class="p-4 bg-black/30 rounded-2xl border border-slate-800/50">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">2. Identité Client</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-semibold text-slate-300 mb-1">Nom de l'établissement</label>
                                    <input type="text" id="nomCafe" class="input-tech rounded-xl px-4 py-3 w-full" placeholder="Ex: L'Orient Café">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-300 mb-1">Slogan</label>
                                        <input type="text" id="sloganCafe" class="input-tech rounded-xl px-4 py-3 w-full" placeholder="Coffee Shop">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-semibold text-slate-300 mb-1">Logo (Fichier)</label>
                                        <input type="text" id="logoUrl" class="input-tech rounded-xl px-4 py-3 w-full" placeholder="logo.jpg" value="logo.jpg">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-4 bg-black/30 rounded-2xl border border-slate-800/50">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">3. Accès & Sécurité</h3>
                            <div>
                                <label class="block text-sm font-semibold text-slate-300 mb-1">Mot de Passe Caisse <i class="fas fa-lock text-slate-500"></i></label>
                                <input type="text" id="caisseToken" class="input-tech rounded-xl px-4 py-3 w-full font-mono text-warning" placeholder="ex: lorient2026">
                            </div>
                        </div>

                        <button id="deployBtn" onclick="creerCafe()" class="w-full bg-neon text-black font-black py-4 rounded-xl text-sm tracking-wide shadow-[0_0_20px_rgba(0,242,254,0.3)] hover:shadow-[0_0_30px_rgba(0,242,254,0.5)] transition hover:scale-[1.02] flex items-center justify-center gap-2 uppercase mt-4">
                            <i class="fas fa-cloud-upload-alt"></i> Créer / Mettre à jour l'instance
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-panel rounded-3xl p-6 h-full flex flex-col">
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-xl font-black flex items-center gap-3">
                            <i class="fas fa-network-wired text-slate-400"></i> Serveurs Actifs
                        </h2>
                        <div class="flex items-center gap-3 w-full md:w-auto">
                            <div class="relative w-full md:w-64">
                                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                <input type="text" id="searchCafe" onkeyup="filtrerCafes()" class="input-tech rounded-full pl-10 pr-4 py-2.5 w-full text-sm" placeholder="Rechercher une instance...">
                            </div>
                            <button onclick="chargerCafes()" class="bg-surface2 border border-slate-700 hover:border-neon hover:text-neon text-slate-300 w-11 h-11 rounded-full flex items-center justify-center transition shadow-lg">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </div>

                    <div id="liste" class="flex-1 overflow-y-auto pr-2 space-y-4" style="max-height: calc(100vh - 300px);">
                        </div>

                </div>
            </div>

        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3"></div>

    <script>
        const MASTER_URL = "sarbini.click";
        let cafesData = []; 

        // Initialisation de la clé Master au chargement
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('sarbini_master_key');
            if (savedKey) document.getElementById('masterKey').value = savedKey;

            // Sauvegarde auto quand on tape
            document.getElementById('masterKey').addEventListener('input', (e) => {
                localStorage.setItem('sarbini_master_key', e.target.value);
            });

            chargerCafes();
        });

        // --- Système de Notification ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let color = type === 'error' ? 'border-alert text-alert' : (type === 'warning' ? 'border-warning text-warning' : 'border-neon text-neon');
            let icon = type === 'error' ? 'fa-times-circle' : (type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle');
            let bg = type === 'error' ? 'bg-alert/10' : (type === 'warning' ? 'bg-warning/10' : 'bg-neon/10');

            toast.className = `toast-enter glass-panel px-5 py-4 rounded-xl border-l-4 ${color} ${bg} shadow-lg flex items-center gap-3 w-80`;
            toast.innerHTML = `<i class="fas ${icon} text-xl"></i> <span class="font-semibold text-sm text-white">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function copyPassword(pwd) {
            navigator.clipboard.writeText(pwd).then(() => showToast("Mot de passe caisse copié !", "success"));
        }

        async function chargerCafes() {
            const key = document.getElementById('masterKey').value;
            const container = document.getElementById('liste');
            container.innerHTML = `<div class="flex flex-col items-center justify-center h-40 text-neon"><i class="fas fa-circle-notch fa-spin fa-3x mb-4"></i><p class="font-mono text-sm tracking-widest uppercase">Connexion aux serveurs...</p></div>`;

            try {
                const res = await fetch('/api/admin/cafes?t=' + Date.now(), { headers: { 'authorization': key }, cache: 'no-store' });
                if (!res.ok) {
                    showToast(`Clé Master invalide`, 'error');
                    return container.innerHTML = `<div class="p-4 bg-alert/10 border border-alert/30 rounded-xl text-alert text-center font-bold"><i class="fas fa-lock mb-2 text-2xl"></i><br>Accès Refusé. Vérifiez la Master Key.</div>`;
                }
                cafesData = await res.json();
                mettreAJourKPIs(cafesData);
                afficherListe(cafesData);
            } catch(e) { 
                showToast('Serveur injoignable', 'error');
                container.innerHTML = `<div class="text-center text-alert font-bold p-10"><i class="fas fa-wifi fa-2x mb-3"></i><br>Erreur de communication avec le cluster.</div>`; 
            }
        }

        function mettreAJourKPIs(liste) {
            document.getElementById('kpi-total').innerText = liste.length;
            const actifs = liste.filter(c => c.statutAbonnement !== 'suspendu').length;
            document.getElementById('kpi-actifs').innerText = actifs;
            document.getElementById('kpi-suspendus').innerText = liste.length - actifs;
        }

        function afficherListe(liste) {
            const container = document.getElementById('liste');
            if (liste.length === 0) return container.innerHTML = `<div class="text-center p-10 text-slate-500 border border-dashed border-slate-700 rounded-2xl"><i class="fas fa-server fa-3x mb-3 opacity-50"></i><p>Aucune instance détectée dans le cluster.</p></div>`;
            
            container.innerHTML = "";
            liste.forEach(c => {
                const siteUrl = `https://${c.cafeId}.${MASTER_URL}`;
                const estSuspendu = c.statutAbonnement === 'suspendu';
                
                const cardClass = estSuspendu ? 'border-alert/30 bg-alert/5 opacity-80 grayscale-[50%]' : 'border-slate-700/50 bg-black/40 hover:border-neon/50';
                const ledClass = estSuspendu ? 'bg-alert led-red' : 'bg-success led-green';
                const statusText = estSuspendu ? 'Bloqué (Impayé)' : 'En Ligne';
                const statusColor = estSuspendu ? 'text-alert' : 'text-success';

                const div = document.createElement('div');
                div.className = `p-5 rounded-2xl border transition-all duration-300 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 ${cardClass}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-4 w-full sm:w-auto">
                        <div class="relative">
                            <img src="${c.logoUrl || 'logo.jpg'}" class="w-14 h-14 rounded-xl object-cover bg-surface2 border border-white/10" onerror="this.src='https://via.placeholder.com/100/1f2937/00F2FE?text=IMG'">
                            <div class="absolute -top-1 -right-1 w-3.5 h-3.5 rounded-full ${ledClass} border-2 border-[#030712]"></div>
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-black text-lg leading-tight text-white">${c.nomCafe || c.cafeId.toUpperCase()}</h3>
                                <span class="text-[0.65rem] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md bg-white/5 border border-white/10 ${statusColor}">${statusText}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <a href="${siteUrl}" target="_blank" class="text-xs font-mono text-neon hover:text-white transition flex items-center gap-1 bg-neon/10 px-2 py-0.5 rounded border border-neon/20">
                                    <i class="fas fa-link"></i> ${c.cafeId}.${MASTER_URL}
                                </a>
                                <span class="text-xs font-mono text-slate-500"><i class="fas fa-key"></i> ${c.caisseToken || '12345678'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                        <button onclick="copyPassword('${c.caisseToken || '12345678'}')" class="w-10 h-10 rounded-xl bg-surface2 border border-slate-700 text-slate-400 hover:text-white hover:bg-slate-700 transition flex items-center justify-center" title="Copier Mot de Passe">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button onclick="editerCafe('${c.cafeId}')" class="w-10 h-10 rounded-xl bg-surface2 border border-slate-700 text-warning hover:bg-warning/20 hover:border-warning/50 transition flex items-center justify-center" title="Modifier la config">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button onclick="basculerStatut('${c.cafeId}', '${estSuspendu ? 'actif' : 'suspendu'}')" class="w-10 h-10 rounded-xl bg-surface2 border border-slate-700 ${estSuspendu ? 'text-success hover:bg-success/20 hover:border-success/50' : 'text-alert hover:bg-alert/20 hover:border-alert/50'} transition flex items-center justify-center" title="${estSuspendu ? 'Réactiver le service' : 'Couper le service'}">
                            <i class="fas ${estSuspendu ? 'fa-play' : 'fa-power-off'}"></i>
                        </button>
                        <button onclick="supprimerCafe('${c.cafeId}')" class="w-10 h-10 rounded-xl bg-surface2 border border-slate-700 text-slate-500 hover:text-alert hover:bg-alert/20 hover:border-alert/50 transition flex items-center justify-center ml-2" title="Détruire (Irréversible)">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function basculerStatut(id, nouveauStatut) {
            const action = nouveauStatut === 'suspendu' ? "couper l'accès à" : "réactiver";
            if(!confirm(`⚠️ CONFIRMATION\nVoulez-vous vraiment ${action} l'instance "${id}" ?`)) return;
            
            const key = document.getElementById('masterKey').value;
            try {
                const res = await fetch(`/api/admin/cafes/${id}/statut`, { 
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'authorization': key }, body: JSON.stringify({ statut: nouveauStatut })
                });
                
                if(res.ok) {
                    showToast(`Instance [${id}] : ${nouveauStatut.toUpperCase()}`, nouveauStatut === 'suspendu' ? 'warning' : 'success');
                    chargerCafes(); 
                } else { showToast("Accès refusé ou erreur serveur.", "error"); }
            } catch(e) { showToast("Erreur réseau.", "error"); }
        }

        function filtrerCafes() {
            const text = document.getElementById('searchCafe').value.toLowerCase();
            const filtres = cafesData.filter(c => (c.nomCafe || '').toLowerCase().includes(text) || c.cafeId.toLowerCase().includes(text));
            afficherListe(filtres);
        }

        function editerCafe(id) {
            const cafe = cafesData.find(c => c.cafeId === id);
            if (!cafe) return;

            document.getElementById('cafeId').value = cafe.cafeId;
            document.getElementById('cafeId').readOnly = true; 
            document.getElementById('cafeId').classList.add('opacity-50', 'cursor-not-allowed');
            
            document.getElementById('nomCafe').value = cafe.nomCafe || '';
            document.getElementById('sloganCafe').value = cafe.sloganCafe || 'Coffee Shop';
            document.getElementById('caisseToken').value = cafe.caisseToken || '';
            document.getElementById('logoUrl').value = cafe.logoUrl || 'logo.jpg';

            const btn = document.getElementById('deployBtn');
            btn.innerHTML = `<i class="fas fa-sync-alt fa-spin mr-2"></i> METTRE À JOUR [${id}]`;
            btn.className = "w-full bg-warning text-black font-black py-4 rounded-xl text-sm tracking-wide shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:shadow-[0_0_30px_rgba(245,158,11,0.5)] transition hover:scale-[1.02] flex items-center justify-center gap-2 uppercase mt-4";

            document.getElementById('formContainer').classList.add('border-warning/50');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            showToast(`Mode édition activé pour [${id}]`, 'warning');
        }

        async function creerCafe() {
            const key = document.getElementById('masterKey').value;
            const cafeId = document.getElementById('cafeId').value.toLowerCase().trim().replace(/[^a-z0-9]/g, ''); 
            if(!cafeId) return showToast("Le sous-domaine (ID) est obligatoire.", "error");
            
            const btn = document.getElementById('deployBtn');
            const isUpdate = btn.innerText.includes("METTRE À JOUR");
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> TRANSMISSION...`; 
            btn.disabled = true;

            const data = {
                targetCafeId: cafeId,
                nomCafe: document.getElementById('nomCafe').value || cafeId.toUpperCase(),
                sloganCafe: document.getElementById('sloganCafe').value || "Coffee Shop",
                caisseToken: document.getElementById('caisseToken').value || '12345678',
                logoUrl: document.getElementById('logoUrl').value
            };

            try {
                const res = await fetch('/api/branding', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'authorization': key }, body: JSON.stringify(data)
                });

                if(res.ok) { 
                    showToast(isUpdate ? `Instance [${cafeId}] mise à jour.` : `Instance [${cafeId}] déployée avec succès.`, 'success');
                    
                    document.getElementById('cafeId').value = ""; 
                    document.getElementById('cafeId').readOnly = false;
                    document.getElementById('cafeId').classList.remove('opacity-50', 'cursor-not-allowed');
                    document.getElementById('nomCafe').value = "";
                    document.getElementById('sloganCafe').value = "";
                    document.getElementById('caisseToken').value = "";
                    
                    btn.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Créer / Mettre à jour l'instance`;
                    btn.className = "w-full bg-neon text-black font-black py-4 rounded-xl text-sm tracking-wide shadow-[0_0_20px_rgba(0,242,254,0.3)] hover:shadow-[0_0_30px_rgba(0,242,254,0.5)] transition hover:scale-[1.02] flex items-center justify-center gap-2 uppercase mt-4";
                    document.getElementById('formContainer').classList.remove('border-warning/50');
                    
                    chargerCafes(); 
                } else { showToast("Accès refusé ou ID existant.", "error"); btn.innerHTML = originalText; }
            } catch(e) { showToast("Erreur réseau.", "error"); btn.innerHTML = originalText; }
            
            btn.disabled = false;
        }

        async function supprimerCafe(id) {
            if(!confirm(`⚠️ DESTRUCTION CRITIQUE\n\nVoulez-vous DÉTRUIRE l'instance "${id}" ?\nTOUTES les commandes, clients, et produits seront effacés DÉFINITIVEMENT.`)) return;
            
            const key = document.getElementById('masterKey').value;
            try {
                const res = await fetch(`/api/admin/cafes/${id}`, { method: 'DELETE', headers: { 'authorization': key } });
                if(res.ok) {
                    showToast(`Instance [${id}] effacée du cluster.`, 'success');
                    chargerCafes();
                } else { showToast("Échec de la suppression.", "error"); }
            } catch(e) { showToast("Erreur réseau.", "error"); }
        }
    </script>
