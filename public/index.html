<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>TA'BIA COFFEE SHOP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="logo.jpg" alt="Logo Ta'Bia" class="logo-img">
                <h1>
                    TA'BIA
                    <span class="logo-subtext">Coffee Shop</span>
                </h1>
            </div>
            <div class="user-badge"><i class="fas fa-user-circle"></i> Espace Client</div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>Qu'est-ce qui vous ferait plaisir ?</h1>
            <p>Commandez depuis votre table ou à emporter</p>
        </div>
    </div>

    <div class="categories-wrapper">
        <div class="categories" id="categoryTabs"></div>
    </div>

    <div class="menu-section">
        <div class="menu-grid" id="menuGrid">
            <div class="loading-menu" style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #7f8c8d;">
                <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Chargement du menu délicieux...
            </div>
        </div>
    </div>

    <div class="tracking-section">
        <h2>📦 Mes commandes en cours</h2>
        <div id="mesCommandes" class="commandes-list"></div>
    </div>

    <div class="floating-cart" id="floatingCart" onclick="ouvrirFermerPanier()">
        <div class="cart-badge" id="conteurpanier">0</div>
        <span class="cart-text">Voir mon panier</span>
        <span class="cart-price" id="floatingCartTotal">0.00 DT</span>
    </div>

    <div class="options-modal" id="optionsModal" style="display: none;">
        <div class="options-content">
            <div class="options-header">
                <h2 id="optionsTitle">Personnalisez</h2>
                <button class="close-options" id="closeOptions">&times;</button>
            </div>
            <p style="color: #64748b; margin-bottom: 15px; font-size: 0.9rem;">Choisissez votre préférence :</p>
            <div id="optionsList" class="options-list"></div>
            <button class="checkout-btn add-option-btn" id="confirmOptionBtn" style="margin-top: 15px; background: #db800a; color: white; border: none; padding: 1rem; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;">
                Ajouter <span id="optionPriceDisplay"></span>
            </button>
        </div>
    </div>

    <div class="cart-modal" id="cartModal" style="display: none;">
        <div class="cart-content">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-basket"></i> Mon Panier</h2>
                <button class="close-cart" id="closeCart">&times;</button>
            </div>
            
            <div id="cartItems" class="cart-items"></div>
            <div style="margin-bottom: 15px; background: #fffbeb; padding: 10px; border-radius: 12px; border: 1px dashed #f59e0b;">
                <label style="font-weight: bold; color: #d97706; font-size: 0.9rem; display: block; margin-bottom: 5px;">
                    <i class="fas fa-star"></i> Client fidèle ?
                </label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="inputFidelitePanier" placeholder="Entrez votre code..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #fcd34d; outline: none; font-weight: bold;">
                    <button type="button" id="btnVerifierFidelite" style="background: #f59e0b; color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer;">OK</button>
                </div>
                <div id="msgFidelite" style="font-size: 0.8rem; color: #10b981; font-weight: bold; margin-top: 5px; display: none;"></div>
            </div>
            
            <div class="cart-total" id="cartTotal" style="margin-bottom: 10px;">Total: 0.00 DT</div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; color: #143621; font-size: 0.95rem; display: block; margin-bottom: 8px;">
                    <i class="fas fa-wallet"></i> Mode de paiement :
                </label>
                <select id="methodePaiementClient" style="width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; font-weight: bold; outline: none; color: #2c3e50; background: #f8fafc; cursor: pointer;">
                    <option value="especes">💵 Payer sur place </option>
                    <option value="en_ligne">📱 Payer en Ligne </option>
                </select>
            </div>

            <button class="checkout-btn" id="checkoutBtn" style="background: #db800a; color: white; width: 100%; padding: 1rem; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; justify-content: center; gap: 10px;">
                Valider la commande <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script-client.js"></script>
</body>
</html>
