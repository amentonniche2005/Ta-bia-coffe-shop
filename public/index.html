<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>TA'BIA COFFEE SHOP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="logo.jpg" alt="Logo Ta'Bia" class="logo-img">
                <h1>
                    TA'BIA
                    <span class="logo-subtext">Coffee Shop</span>
                </h1>
            </div>
            <div class="user-badge"><i class="fas fa-user-circle"></i> Espace Client</div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>Qu'est-ce qui vous ferait plaisir ?</h1>
            <p>Commandez depuis votre table ou à emporter</p>
        </div>
    </div>

    <div class="categories-wrapper">
        <div class="categories" id="categoryTabs"></div>
    </div>

    <div class="menu-section">
        <div class="menu-grid" id="menuGrid">
            <div class="loading-menu" style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #7f8c8d;">
                <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Chargement du menu délicieux...
            </div>
        </div>
    </div>

    <div class="tracking-section">
        <h2>📦 Mes commandes en cours</h2>
        <div id="mesCommandes" class="commandes-list"></div>
    </div>

    <div class="floating-cart" id="floatingCart" onclick="ouvrirFermerPanier()">
        <div class="cart-badge" id="conteurpanier">0</div>
        <span class="cart-text">Voir mon panier</span>
        <span class="cart-price" id="floatingCartTotal">0.00 DT</span>
    </div>

    <div class="options-modal" id="optionsModal" style="display: none;">
        <div class="options-content">
            <div class="options-header">
                <h2 id="optionsTitle">Personnalisez</h2>
                <button class="close-options" id="closeOptions">&times;</button>
            </div>
            <p style="color: #64748b; margin-bottom: 15px; font-size: 0.9rem;">Choisissez votre préférence :</p>
            <div id="optionsList" class="options-list"></div>
            <button class="checkout-btn add-option-btn" id="confirmOptionBtn" style="margin-top: 15px; background: #db800a; color: white; border: none; padding: 1rem; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;">
                Ajouter <span id="optionPriceDisplay"></span>
            </button>
        </div>
    </div>

<div class="cart-modal" id="cartModal" style="display: none;">
        <div class="cart-content">
            
            <div class="cart-header">
                <h2><i class="fas fa-shopping-bag" style="color: #db800a;"></i> Votre Panier</h2>
                <button class="close-cart" id="closeCart"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="cartItems" class="cart-items">
                </div>
            
            <div class="checkout-section">
                <div style="margin-bottom: 15px; background: #fffbeb; padding: 12px; border-radius: 16px; border: 1px solid #fde68a;">
                    <div class="sleek-input-group">
                        <i class="fas fa-star sleek-icon"></i>
                        <input type="text" id="inputFidelitePanier" class="sleek-input" placeholder="Avez-vous un code fidélité ?">
                        <button type="button" id="btnVerifierFidelite" style="background: #f59e0b; color: white; border: none; border-radius: 10px; padding: 0 20px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);">OK</button>
                    </div>
                    <div id="msgFidelite" style="font-size: 0.85rem; color: #059669; font-weight: 800; margin-top: 8px; margin-left: 5px; display: none;"></div>
                </div>
                
                <div style="position: relative; margin-bottom: 20px;">
                    <i class="fas fa-credit-card sleek-icon" style="color: #143621; z-index: 10;"></i>
                    <select id="methodePaiementClient" class="sleek-select">
                        <option value="especes">Payer sur place (Espèces)</option>
                        <option value="en_ligne">Payer en ligne (Sécurisé)</option>
                    </select>
                    <i class="fas fa-chevron-down" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none;"></i>
                </div>

                <div class="cart-total-row">
                    <span style="font-size: 1.1rem; color: #64748b; font-weight: 700;">Total à payer</span>
                    <span id="cartTotal">0.00 DT</span>
                </div>

                <button class="checkout-btn" id="checkoutBtn" style="background: linear-gradient(135deg, #db800a, #e65c00); color: white; width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 12px; box-shadow: 0 10px 25px rgba(219, 128, 10, 0.4); transition: transform 0.2s;">
                    Valider ma commande <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script-client.js"></script>
</body>
</html>
